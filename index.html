<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f5f9f5;
    padding:40px;
}

.pantalla{
    max-width:800px;
    margin:auto;
}

h1{
    color:#2e7d32;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.oculto{
    display:none;
}

</style>

</head>

<body>

<!-- PANTALLA DE INICIO -->

<div id="inicio" class="pantalla">

    <h1>♻️ EcoReto: Separa tus residuos</h1>

    <p>
        Aprende a clasificar correctamente los residuos
        y conviértete en un experto del reciclaje.
    </p>

    <br>

    <button onclick="iniciarJuego()">
        COMENZAR
    </button>

</div>

<!-- PANTALLA DEL JUEGO -->

<div id="juego" class="pantalla oculto">

   <h2>NIVEL 1</h2>

<p>
🏆 Puntos:
<span id="puntos">0</span>
</p>

<h3 id="progreso">
Residuo 1/10
</h3>

<h1 id="emoji">
🍌
</h1>

<h2 id="nombre">
Cáscara de plátano
</h2>

<br>

<button onclick="verificar('organico')">
🟢 Orgánico
</button>

<button onclick="verificar('inorganico')">
⚫ Inorgánico
</button>

<p id="mensaje"></p>

</div>

<script>

function iniciarJuego(){

document.getElementById("inicio").classList.add("oculto");

document.getElementById("juego").classList.remove("oculto");

cargarResiduo();

}
function verificar(tipo){

if(tipo === nivel1[actual].tipo){

document.getElementById("mensaje").innerHTML =
"✅ Correcto";

puntos += 10;

}else{

document.getElementById("mensaje").innerHTML =
"❌ Incorrecto";

}

document.getElementById("puntos").innerHTML =
puntos;

setTimeout(function(){

actual++;

if(actual < nivel1.length){

cargarResiduo();

document.getElementById("mensaje").innerHTML = "";

}else{

document.getElementById("juego").innerHTML =

"<h1>🌟 Nivel 1 completado</h1>" +

"<p>🏆 Puntos: " + puntos + "</p>" +

"<button>CONTINUAR</button>";

}

},1000);

}
const nivel1 = [

{
emoji:"🍌",
nombre:"Cáscara de plátano",
tipo:"organico"
},

{
emoji:"🍎",
nombre:"Restos de manzana",
tipo:"organico"
},

{
emoji:"🍂",
nombre:"Hojas secas",
tipo:"organico"
},

{
emoji:"🥤",
nombre:"Botella de plástico",
tipo:"inorganico"
}

];

let actual = 0;
let puntos = 0;

function cargarResiduo(){

document.getElementById("emoji").innerHTML =
nivel1[actual].emoji;

document.getElementById("nombre").innerHTML =
nivel1[actual].nombre;

document.getElementById("progreso").innerHTML =
"Residuo " + (actual+1) + "/" + nivel1.length;

}
    
</script>

</body>
</html>
