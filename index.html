<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f5f9f5;
    padding:40px;
}

.pantalla{
    max-width:800px;
    margin:auto;
}

h1{
    color:#2e7d32;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.oculto{
    display:none;
}

</style>

</head>

<body>

<!-- PANTALLA DE INICIO -->

<div id="inicio" class="pantalla">

    <h1>♻️ EcoReto: Separa tus residuos</h1>

    <p>
        Aprende a clasificar correctamente los residuos
        y conviértete en un experto del reciclaje.
    </p>

    <br>

    <button onclick="iniciarJuego()">
        COMENZAR
    </button>

</div>

<!-- PANTALLA DEL JUEGO -->

<div id="juego" class="pantalla oculto">

    <h2>NIVEL 1</h2>

    <h3 id="progreso">
        Residuo 1/10
    </h3>

    <p id="residuo">
        🍌 Cáscara de plátano
    </p>

</div>

<script>

function iniciarJuego(){

    document.getElementById("inicio").classList.add("oculto");

    document.getElementById("juego").classList.remove("oculto");

}

</script>

</body>
</html>
