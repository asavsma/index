<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto</title>

<style>

body{

    font-family:Arial, sans-serif;

    text-align:center;

    margin:0;

    padding:40px;

    min-height:100vh;

    background:

        linear-gradient(
            rgba(255,255,255,.15),
            rgba(255,255,255,.15)
        ),

        url("img/fondo-ecoreto.png");

    background-position:center bottom;

    background-repeat:no-repeat;

    background-size:cover;

}

.pantalla{

    max-width:1000px;

    margin:auto;

    padding:20px;

}

h1{
    color:#2e7d32;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.oculto{
    display:none;
}
.residuo-img{
    width:180px;
    max-width:80%;
    height:auto;
    display:block;
    margin:20px auto;
}
.contenedores{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:14px;
    margin-top:20px;
}

.contenedor-img{
    width:120px;
    height:auto;
    display:block;
    margin:auto;
}

.boton-contenedor{
    background:white;
    color:#2e7d32;
    border:2px solid #d9ead9;
    padding:10px;
    width:150px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.insignia-img{
    width:180px;
    max-width:80%;
    height:auto;
    display:block;
    margin:15px auto;
}
.residuo-img{
    animation: aparecerResiduo .4s ease;
}

@keyframes aparecerResiduo{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.correcto{
    animation: rebote .45s ease;
}

@keyframes rebote{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
}

.incorrecto{
    animation: vibrar .35s ease;
}

@keyframes vibrar{
    0%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    50%{ transform:translateX(6px); }
    75%{ transform:translateX(-4px); }
    100%{ transform:translateX(0); }
}   
.boton-contenedor{
    transition: all 0.25s ease;
}

.boton-contenedor:hover{
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 8px 18px rgba(0,0,0,.18);
}

.boton-contenedor:active{
    transform: scale(0.96);
}

.tarjeta-residuo{

    background:white;

    width:520px;

    max-width:95%;

    margin:25px auto;

    padding:35px;

    border-radius:28px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.12);

    border:4px solid #e6f5e6;

    transition:.25s;

}

.tarjeta-residuo:hover{

    transform:translateY(-3px);

}

.residuo-img{

    width:240px;

    max-width:90%;

    display:block;

    margin:15px auto;

}

#nombre{

    color:#1b5e20;

    font-size:34px;

    margin-top:10px;

}

.barra-juego{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    max-width:700px;
    margin:0 auto 25px auto;
    padding:15px 20px;
    background:#1b5e20;
    color:white;
    border-radius:18px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
}

.info-juego{
    font-weight:bold;
    font-size:18px;
}

.panel-estado{

    display:flex;

    justify-content:space-between;

    align-items:center;

    max-width:700px;

    margin:0 auto 25px auto;

    padding:18px 25px;

    background:linear-gradient(90deg,#2e7d32,#43a047);

    border-radius:18px;

    box-shadow:0 8px 20px rgba(0,0,0,.15);

    color:white;

    font-size:20px;

    font-weight:bold;

}

@media(max-width:700px){

    .panel-estado{

        flex-direction:column;

        gap:10px;

    }

}

.inicio-card{
    background:white;
    max-width:760px;
    padding:50px 35px;
    border-radius:32px;
    box-shadow:0 14px 35px rgba(0,0,0,.14);
    border:4px solid #d8f3dc;
}

.inicio-icono{
    font-size:70px;
    margin-bottom:10px;
}

.inicio-card h1{
    font-size:54px;
    margin:5px 0;
    color:#1b5e20;
}

.inicio-card h2{
    font-size:30px;
    margin:0 0 18px 0;
    color:#43a047;
}

.inicio-texto{
    max-width:560px;
    margin:0 auto 25px auto;
    font-size:20px;
    line-height:1.5;
    color:#3c3c3c;
}

.inicio-detalles{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin:25px 0 35px 0;
}

.inicio-detalles span{
    background:#eef8ee;
    color:#1b5e20;
    padding:10px 16px;
    border-radius:999px;
    font-weight:bold;
    font-size:15px;
}

.boton-inicio{
    font-size:22px;
    padding:18px 42px;
    border-radius:999px;
    background:linear-gradient(90deg,#2e7d32,#43a047);
    box-shadow:0 8px 18px rgba(46,125,50,.35);
}

.boton-inicio:hover{
    transform:translateY(-3px) scale(1.04);
}

@media(max-width:600px){
    .inicio-card h1{
        font-size:42px;
    }

    .inicio-card h2{
        font-size:24px;
    }

    .inicio-texto{
        font-size:17px;
    }
}

.titulo-seccion{

    color:#1b5e20;

    font-size:32px;

    font-weight:bold;

    margin-bottom:20px;

    text-shadow:0 2px 4px rgba(255,255,255,.7);

}
    
</style>

</head>

<body>

<!-- PANTALLA DE INICIO -->

    <div class="inicio-icono">♻️</div>

    <h1>EcoReto</h1>

    <h2>Separa tus residuos</h2>

    <p class="inicio-texto">
        Aprende a clasificar correctamente los residuos en dos niveles

    </p>

    <div class="inicio-detalles">
        <span>🌱 Nivel 1: Básico</span>
        <span>♻️ Nivel 2: Por tipo de material</span>

    </div>

    <button class="boton-inicio" onclick="iniciarJuego()">

    </button>

</div>

<!-- PANTALLA DEL JUEGO -->

<div id="juego" class="pantalla oculto">

<div class="panel-estado">

    </div>

    <div>

    </div>

</div>

<div class="tarjeta-residuo">

    <h2 id="nombre">

</div>

<br>

<div class="contenedores">

<button class="boton-contenedor" onclick="verificar('organico')">

<button class="boton-contenedor" onclick="verificar('inorganico')">

</div>

<p id="mensaje"></p>

</div>

{

},

const ecoConsejos = [

"💚 <strong>Cada acción cuenta.</strong><br><br>Separar los residuos en orgánicos e inorgánicos es el primer paso para facilitar su aprovechamiento y reducir la cantidad de basura que llega a los rellenos sanitarios.",

"🌱 <strong>Los residuos orgánicos tienen una segunda vida.</strong><br><br>Pueden convertirse en composta, un abono natural que mejora la calidad del suelo y ayuda al crecimiento de las plantas.",

"♻️ <strong>Reciclar empieza en casa.</strong><br><br>Una correcta separación permite recuperar materiales y aprovechar mejor los recursos.",

"📦 <strong>Evita contaminar materiales reciclables.</strong><br><br>Cuando mezclamos residuos orgánicos con materiales reciclables, estos pueden perder la posibilidad de reciclarse.",

"🥤 <strong>Ponlo en práctica.</strong><br><br>Antes de depositar una botella, lata o envase en el contenedor correspondiente, procura vaciar completamente su contenido para facilitar su reciclaje.",

"🔋 <strong>Las pilas requieren atención especial.</strong><br><br>No deben mezclarse con la basura común; lo ideal es llevarlas a un centro de acopio autorizado.",

"📄 <strong>El cartón limpio se recicla mejor.</strong><br><br>Mantén las cajas libres de restos de comida o líquidos para facilitar su aprovechamiento.",

"🌎 <strong>Separar correctamente beneficia a todos.</strong><br><br>Una buena clasificación facilita el trabajo de recicladores y centros de aprovechamiento, impulsando una gestión más eficiente de los residuos."

];
    
let actual = 0;
let puntos = 0;
let aciertos = 0;
let errores = 0;
let consejoAleatorio = "";
let nivelActual = 1;
let residuosActuales = [];
let puntosNivel1 = 0;
let puntosNivel2 = 0;
let aciertosNivel1 = 0;
let erroresNivel1 = 0;
let aciertosNivel2 = 0;
let erroresNivel2 = 0;
    
function iniciarJuego(){
    document.getElementById("inicio").classList.add("oculto");
    document.getElementById("juego").classList.remove("oculto");

    nivel1.sort(() => Math.random() - 0.5);
    
    consejoAleatorio =
    ecoConsejos[Math.floor(Math.random() * ecoConsejos.length)];
    
    actual = 0;
    puntos = 0;
    aciertos = 0;
    errores = 0;

    cargarResiduo();
}

function cargarResiduo(){

    if(nivel1[actual].imagen){

        document.getElementById("imagenResiduo").style.display = "block";
        document.getElementById("emoji").style.display = "none";

        document.getElementById("imagenResiduo").src =
        nivel1[actual].imagen;

        document.getElementById("imagenResiduo").alt =
        nivel1[actual].nombre;

    }else{

        document.getElementById("imagenResiduo").style.display = "none";
        document.getElementById("emoji").style.display = "block";

        document.getElementById("emoji").innerHTML =
        nivel1[actual].emoji;

    }

    document.getElementById("nombre").innerHTML =
    nivel1[actual].nombre;

    document.getElementById("progreso").innerHTML =
    "Residuo " + (actual + 1) + "/" + nivel1.length;

    document.getElementById("puntos").innerHTML =
    puntos;
}

function verificar(tipo){

    const imagen = document.getElementById("imagenResiduo");

    imagen.classList.remove("correcto", "incorrecto");

    void imagen.offsetWidth;
    
    if(tipo === nivel1[actual].tipo){
        document.getElementById("mensaje").innerHTML = "✅ ¡Correcto!";
        puntos += 10;
        aciertos++;
    }else{
        document.getElementById("mensaje").innerHTML = "❌ Respuesta incorrecta";
        errores++;
        imagen.classList.add("incorrecto");
    }    
    
    document.getElementById("puntos").innerHTML = puntos;

    document.getElementById("mensaje").innerHTML +=
    "<br><br>" +
    nivel1[actual].explicacion +
    "<br><br>" +
    "<button onclick='siguienteResiduo()'>SIGUIENTE</button>";
}

function siguienteResiduo(){
    actual++;

    if(actual < nivel1.length){
        cargarResiduo();
        document.getElementById("mensaje").innerHTML = "";
    }else{
    puntosNivel1 = puntos;
    aciertosNivel1 = aciertos;
    erroresNivel1 = errores;    
        document.getElementById("juego").innerHTML =
        "<h1>🌟 Nivel 1 completado</h1>" +
        "<p>🏆 Puntos: " + puntos + "</p>" +
        "<p>✅ Aciertos: " + aciertos + "</p>" +
        "<p>❌ Errores: " + errores + "</p>" +
        "<br>" +

    "<p style='text-align:center;font-weight:bold;color:#2e7d32;font-size:20px;margin-bottom:18px;'>💡 ECOCONSEJO</p>" +

    "<hr style='border:none;border-top:1px solid #cfe8cf;margin-bottom:18px;'>" +

    consejoAleatorio +

    "</div>" +

    "<br>" +

    "<button onclick='iniciarNivel2()'>CONTINUAR AL NIVEL 2</button>";
    }
}

"<h1 id='emoji'></h1>" +

"<div class='contenedores'>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('organico')\">" +

"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('madera')\">" +
"<img class='contenedor-img' src='img/contenedor-madera.png' alt='Madera'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('plastico')\">" +
"<img class='contenedor-img' src='img/contenedor-plastico.png' alt='Plástico'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('tela')\">" +
"<img class='contenedor-img' src='img/contenedor-tela.png' alt='Tela'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('vidrio')\">" +
"<img class='contenedor-img' src='img/contenedor-vidrio.png' alt='Vidrio'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('metal')\">" +
"<img class='contenedor-img' src='img/contenedor-metal.png' alt='Metal'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('especial')\">" +
"<img class='contenedor-img' src='img/contenedor-inorganico.png' alt='Inorgánico de manejo especial'>" +
"</button>" +

"<button class='boton-contenedor' onclick=\"verificarNivel2('noreciclable')\">" +
"<img class='contenedor-img' src='img/contenedor-no-reciclable.png' alt='No reciclable'>" +
"</button>" +

"</div>" +
    "<p id='mensaje'></p>";

    cargarResiduoNivel2();
}
function cargarResiduoNivel2(){

    document.getElementById("imagenResiduo").style.display = "block";
    document.getElementById("emoji").style.display = "none";

    document.getElementById("imagenResiduo").src =
    residuosActuales[actual].imagen;

    document.getElementById("imagenResiduo").alt =
    residuosActuales[actual].nombre;

    document.getElementById("nombre").innerHTML =
    residuosActuales[actual].nombre;

    document.getElementById("progreso").innerHTML =
    "Residuo " + (actual + 1) + "/" + residuosActuales.length;

    document.getElementById("puntos").innerHTML =
    puntos;
}

function verificarNivel2(tipo){
    if(tipo === residuosActuales[actual].tipo){
        document.getElementById("mensaje").innerHTML = "✅ ¡Correcto!";
        puntos += 10;
        aciertos++;
    }else{
        document.getElementById("mensaje").innerHTML = "❌ Respuesta incorrecta";
        errores++;
    }

    document.getElementById("puntos").innerHTML = puntos;

    document.getElementById("mensaje").innerHTML +=
    "<br><br>" +
    residuosActuales[actual].explicacion +
    "<br><br>" +
    "<button onclick='siguienteResiduoNivel2()'>SIGUIENTE</button>";
}

function siguienteResiduoNivel2(){
    actual++;

    if(actual < residuosActuales.length){
        cargarResiduoNivel2();
        document.getElementById("mensaje").innerHTML = "";
    }else{
       puntosNivel2 = puntos;
    aciertosNivel2 = aciertos;
    erroresNivel2 = errores;

    mostrarPantallaFinal();
    }
}

function obtenerInsignia(puntosTotales){

    if(puntosTotales <= 79){
        return {
            imagen:"img/insignia-aprendiz.png",
            titulo:"Aprendiz Ambiental",
            mensaje:"Estás comenzando tu camino hacia una mejor separación de residuos. Sigue practicando y cada acción contará para cuidar el planeta."
        };
    }

    if(puntosTotales <= 139){
        return {
            imagen:"img/insignia-guardian.png",
            titulo:"Guardián Ambiental",
            mensaje:"Con tus acciones ayudas a proteger el medio ambiente y fomentas una cultura de reciclaje responsable."
        };
    }

    return {
        imagen:"img/insignia-maestro.png",
        titulo:"Maestro del Reciclaje",
        mensaje:"¡Excelente trabajo! Has demostrado un gran conocimiento sobre la correcta separación de residuos."
    };
}

function mostrarPantallaFinal(){

    let puntosTotales = puntosNivel1 + puntosNivel2;
    let aciertosTotales = aciertosNivel1 + aciertosNivel2;
    let erroresTotales = erroresNivel1 + erroresNivel2;

    let insignia = obtenerInsignia(puntosTotales);

    document.getElementById("juego").innerHTML =
    "<h1>🎉 ¡Felicidades!</h1>" +

    "<h2>Has completado EcoReto</h2>" +

    "<p><strong>🏆 Puntuación total:</strong> " + puntosTotales + " pts</p>" +

    "<hr>" +

    "<h3>Resultados</h3>" +

    "<p><strong>Nivel 1:</strong> " + aciertosNivel1 + "/10 aciertos</p>" +

    "<p><strong>Nivel 2:</strong> " + aciertosNivel2 + "/10 aciertos</p>" +

    "<p><strong>Total:</strong> " + aciertosTotales + " aciertos y " + erroresTotales + " errores</p>" +

    "<div style='margin:30px auto;padding:25px;background:#eef8ee;border-radius:16px;max-width:650px;box-shadow:0 4px 10px rgba(0,0,0,.08);'>" +

    "<img class='insignia-img' src='" + insignia.imagen + "' alt='" + insignia.titulo + "'>" +

    "<p style='font-weight:bold;color:#2e7d32;font-size:18px;margin-top:10px;'>INSIGNIA OBTENIDA</p>" +

    "<h2>" + insignia.titulo + "</h2>" +

    "<p>" + insignia.mensaje + "</p>" +

    "</div>" +

    "<p><strong>💚 Cada acción cuenta.</strong><br>Separar correctamente tus residuos contribuye a una cultura ambiental más responsable.</p>" +

    "<br>" +

    "<button onclick='location.reload()'>JUGAR NUEVAMENTE</button>";
    lanzarConfeti();
}
    
function lanzarConfeti(){
    confetti({
        particleCount: 160,
        spread: 80,
        origin: { y: 0.6 }
    });
}
    
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
</html>
