<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto: Separa tus residuos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f9f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.game-container{
    width:100%;
    max-width:900px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:1.2rem;
    font-weight:bold;
}

.progreso{
    text-align:center;
    font-size:1.2rem;
    margin-bottom:30px;
}

.residuo-card{
    text-align:center;
    margin-bottom:30px;
}

.emoji{
    font-size:100px;
    margin-bottom:15px;
}

.contenedores{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.contenedor{
    border:none;
    cursor:pointer;
    width:220px;
    background:white;
    border-radius:16px;
    padding:20px;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.contenedor:hover{
    transform:translateY(-6px);
}

.bote{
    width:100px;
    height:120px;
    margin:auto;
    border-radius:0 0 15px 15px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:2rem;
}

.organico .bote{
    background:#4CAF50;
}

.reciclable .bote{
    background:#2196F3;
}

.especial .bote{
    background:#FF9800;
}

.contenedor span{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

#mensaje{
    text-align:center;
    min-height:40px;
    margin-bottom:25px;
    font-weight:bold;
}

@media(max-width:768px){
    .contenedor{
        width:100%;
        max-width:280px;
    }
}
</style>
</head>

<body>

<div class="game-container">

    <div class="header">
        <div>⏱️ 60 s</div>
        <div>🏆 0 pts</div>
    </div>

    <div class="progreso">
        ♻️ Residuo 1/12
    </div>

    <div class="residuo-card">
        <div class="emoji">🥤</div>
        <h2>Botella de plástico</h2>
    </div>

    <div id="mensaje"></div>

    <div class="contenedores">

        <button class="contenedor organico">
            <div class="bote">♻️</div>
            <span>Orgánico</span>
        </button>

        <button class="contenedor reciclable">
            <div class="bote">♻️</div>
            <span>Reciclable</span>
        </button>

        <button class="contenedor especial">
            <div class="bote">♻️</div>
            <span>Manejo Especial</span>
        </button>

    </div>

</div>

</body>
</html>
