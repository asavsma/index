<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>EcoReto</title>
</head>

<body>

<h1>♻️ EcoReto</h1>

<p id="residuo">🥤 Botella de plástico</p>

<button onclick="verificar('organico')">
🟢 Orgánico
</button>

<button onclick="verificar('reciclable')">
🔵 Reciclable
</button>

<button onclick="verificar('especial')">
🟠 Especial
</button>

<p id="mensaje"></p>

<script>

function verificar(tipo){

    if(tipo === "reciclable"){

        document.getElementById("mensaje").innerHTML =
        "✅ Correcto";

    }else{

        document.getElementById("mensaje").innerHTML =
        "❌ Incorrecto";

    }

}

</script>

</body>
</html>
