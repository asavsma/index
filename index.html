<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f5f9f5;
    padding:40px;
}

.pantalla{
    max-width:800px;
    margin:auto;
}

h1{
    color:#2e7d32;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.oculto{
    display:none;
}
.residuo-img{
    width:180px;
    max-width:80%;
    height:auto;
    display:block;
    margin:20px auto;
}
</style>

</head>

<body>

<!-- PANTALLA DE INICIO -->

<div id="inicio" class="pantalla">

    <h1>♻️ EcoReto: Separa tus residuos</h1>

    <p>
        Aprende a clasificar correctamente los residuos
        y conviértete en un experto del reciclaje.
    </p>

    <br>

    <button onclick="iniciarJuego()">
        COMENZAR
    </button>

</div>

<!-- PANTALLA DEL JUEGO -->

<div id="juego" class="pantalla oculto">

   <h2>NIVEL 1</h2>

<p>
🏆 Puntos:
<span id="puntos">0</span>
</p>

<h3 id="progreso">
Residuo 1/10
</h3>
<h1 id="emoji"></h1>
<img id="imagenResiduo" class="residuo-img" src="" alt="Residuo">

<h2 id="nombre">
Cáscara de plátano
</h2>

<br>

<button onclick="verificar('organico')">
🟢 Orgánico
</button>

<button onclick="verificar('inorganico')">
⚫ Inorgánico
</button>

<p id="mensaje"></p>

</div>

<script>

const nivel1 = [
{
imagen:"img/cascara-platano.png",

tipo:"organico",
explicacion:"Las cáscaras de frutas son residuos orgánicos y pueden aprovecharse para elaborar composta."
},
{

},
{

},
{

},
{

},
{
imagen:"img/foco.png",
nombre:"Foco",
tipo:"inorganico",
explicacion:"Los focos deben separarse correctamente para evitar daños al ambiente y facilitar su disposición adecuada."
},
{
imagen:"img/celular-estrellado.png",
nombre:"Celular viejo",
tipo:"inorganico",

const nivel2 = [
{
imagen:"img/cascara-platano.png",
nombre:"Cáscara de plátano",
tipo:"organico",

},
{
imagen:"img/restos-verduras.png",
nombre:"Restos de verduras",
tipo:"organico",
explicacion:"🌱 <strong>Aprende.</strong><br><br>Los residuos vegetales son biodegradables y pueden aprovecharse mediante compostaje."
},
{
imagen:"img/caja-cereal.png",
nombre:"Caja de cereal",
tipo:"papel",

},
{
imagen:"img/periodico.png",
nombre:"Periódico",

},
{
imagen:"img/tabla-madera.png",
nombre:"Tabla de madera",
tipo:"madera",
explicacion:"♻️ <strong>Dale una segunda vida.</strong><br><br>La madera puede reutilizarse o aprovecharse antes de convertirse en residuo."
},
{
imagen:"img/silla-madera.png",
nombre:"Restos de mueble de madera",
tipo:"madera",
explicacion:"♻️ <strong>Dale una segunda vida.</strong><br><br>Antes de desechar un mueble, considera repararlo, reutilizarlo o donarlo. Si ya no es útil, sepáralo correctamente para facilitar su aprovechamiento."
},
{
imagen:"img/botella-pet.png",
nombre:"Botella PET",
tipo:"plastico",
explicacion:"💡 <strong>Ponlo en práctica.</strong><br><br>Vacía completamente su contenido y, si es posible, aplástala antes de reciclarla para reducir su volumen."
},
{
imagen:"img/envase-detergente.png",
nombre:"Envase de detergente",
tipo:"plastico",
explicacion:"💡 <strong>Ponlo en práctica.</strong><br><br>Procura vaciar el envase y cerrar su tapa antes de depositarlo en el contenedor correspondiente."
},
{
imagen:"img/playera.png",
nombre:"Camiseta vieja",
tipo:"tela",
explicacion:"♻️ <strong>Dale una segunda vida.</strong><br><br>Si la prenda aún está en buen estado, considera donarla o reutilizarla antes de desecharla."
},
{
imagen:"img/pantalon-mezclilla.png",
nombre:"Pantalon de mezclilla",
tipo:"tela",
explicacion:"♻️ <strong>Aprende.</strong><br><br>Algunos textiles pueden reciclarse o reutilizarse para fabricar nuevos productos."
},
{
imagen:"img/botella-vidrio.png",
nombre:"Botella de vidrio",
tipo:"vidrio",
explicacion:"💡 <strong>Ponlo en práctica.</strong><br><br>Vacía su contenido antes de desecharla y evita romperla para proteger a quienes manejan los residuos."
},
{
imagen:"img/espejo-roto.png",
nombre:"Espejo roto",
tipo:"vidrio",
explicacion:"♻️ <strong>Aprende.</strong><br><br>El vidrio puede reciclarse muchas veces sin perder sus propiedades."
},
{
imagen:"img/lata-aluminio.png",
nombre:"Lata de aluminio",
tipo:"metal",
explicacion:"💡 <strong>Ponlo en práctica.</strong><br><br>Vacía completamente la lata antes de reciclarla para mantener limpios los materiales recuperables."
},
{
imagen:"img/tornillo.png",
nombre:"Tornillo",
tipo:"metal",
explicacion:"♻️ <strong>Aprende.</strong><br><br>Los metales pueden recuperarse y utilizarse nuevamente mediante procesos de reciclaje."
},
{

nombre:"Pila",
tipo:"especial",
explicacion:"⚠️ <strong>Importante.</strong><br><br>Las pilas son residuos inorgánicos de manejo especial. Deposítalas en centros de acopio autorizados y nunca las mezcles con la basura doméstica."
},
{
imagen:"img/celular-estrellado.png",
nombre:"Celular viejo",
tipo:"especial",
explicacion:"⚠️ <strong>Importante.</strong><br><br>Los celulares contienen materiales valiosos que pueden recuperarse mediante reciclaje especializado. Evita desecharlos junto con la basura doméstica."
},
{
imagen:"img/cargador-celular.png",
nombre:"Cable eléctrico",
tipo:"especial",

},

imagen:"img/teclado.png",

},
{
imagen:"img/papel-higienico.png",
nombre:"Papel higiénico usado",
tipo:"noreciclable",
explicacion:"🚫 <strong>Manejo adecuado.</strong><br><br>Este residuo no puede reciclarse. Deposítalo en una bolsa bien cerrada para ayudar a prevenir la contaminación cruzada."
},
{
imagen:"img/toalla-sanitaria.png",
nombre:"Toalla sanitaria usada",
tipo:"noreciclable",
explicacion:"🚫 <strong>Manejo adecuado.</strong><br><br>Colócala en una bolsa bien cerrada antes de desecharla y no la mezcles con materiales reciclables."
},
{
imagen:"img/panal.png",
nombre:"Pañal desechable",
tipo:"noreciclable",
explicacion:"🚫 <strong>Manejo adecuado.</strong><br><br>Los pañales desechables no son reciclables y deben depositarse en una bolsa cerrada antes de su disposición final."
},
{
imagen:"img/colilla-cigarro.png",
nombre:"Colilla de cigarro",
tipo:"noreciclable",
explicacion:"🚫 <strong>Manejo adecuado.</strong><br><br>Las colillas contienen sustancias contaminantes y nunca deben arrojarse al suelo o al drenaje."
}
];
    
const ecoConsejos = [

"💚 <strong>Cada acción cuenta.</strong><br><br>Separar los residuos en orgánicos e inorgánicos es el primer paso para facilitar su aprovechamiento y reducir la cantidad de basura que llega a los rellenos sanitarios.",

"🌱 <strong>Los residuos orgánicos tienen una segunda vida.</strong><br><br>Pueden convertirse en composta, un abono natural que mejora la calidad del suelo y ayuda al crecimiento de las plantas.",

"♻️ <strong>Reciclar empieza en casa.</strong><br><br>Una correcta separación permite recuperar materiales y aprovechar mejor los recursos.",

"📦 <strong>Evita contaminar materiales reciclables.</strong><br><br>Cuando mezclamos residuos orgánicos con materiales reciclables, estos pueden perder la posibilidad de reciclarse.",

"🥤 <strong>Ponlo en práctica.</strong><br><br>Antes de depositar una botella, lata o envase en el contenedor correspondiente, procura vaciar completamente su contenido para facilitar su reciclaje.",

"🔋 <strong>Las pilas requieren atención especial.</strong><br><br>No deben mezclarse con la basura común; lo ideal es llevarlas a un centro de acopio autorizado.",

"📄 <strong>El cartón limpio se recicla mejor.</strong><br><br>Mantén las cajas libres de restos de comida o líquidos para facilitar su aprovechamiento.",

"🌎 <strong>Separar correctamente beneficia a todos.</strong><br><br>Una buena clasificación facilita el trabajo de recicladores y centros de aprovechamiento, impulsando una gestión más eficiente de los residuos."

];
    
let actual = 0;
let puntos = 0;
let aciertos = 0;
let errores = 0;
let consejoAleatorio = "";
let nivelActual = 1;
let residuosActuales = [];
let puntosNivel1 = 0;
let puntosNivel2 = 0;
let aciertosNivel1 = 0;
let erroresNivel1 = 0;
let aciertosNivel2 = 0;
let erroresNivel2 = 0;
    
function iniciarJuego(){
    document.getElementById("inicio").classList.add("oculto");
    document.getElementById("juego").classList.remove("oculto");

    nivel1.sort(() => Math.random() - 0.5);
    
    consejoAleatorio =
    ecoConsejos[Math.floor(Math.random() * ecoConsejos.length)];
    
    actual = 0;
    puntos = 0;
    aciertos = 0;
    errores = 0;

    cargarResiduo();
}

function cargarResiduo(){

    if(nivel1[actual].imagen){

        document.getElementById("imagenResiduo").style.display = "block";
        document.getElementById("emoji").style.display = "none";

        document.getElementById("imagenResiduo").src =
        nivel1[actual].imagen;

        document.getElementById("imagenResiduo").alt =
        nivel1[actual].nombre;

    }else{

        document.getElementById("imagenResiduo").style.display = "none";
        document.getElementById("emoji").style.display = "block";

        document.getElementById("emoji").innerHTML =
        nivel1[actual].emoji;

    }

    document.getElementById("nombre").innerHTML =
    nivel1[actual].nombre;

    document.getElementById("progreso").innerHTML =
    "Residuo " + (actual + 1) + "/" + nivel1.length;

    document.getElementById("puntos").innerHTML =
    puntos;
}

function verificar(tipo){
    if(tipo === nivel1[actual].tipo){
        document.getElementById("mensaje").innerHTML = "✅ ¡Correcto!";
        puntos += 10;
        aciertos++;
    }else{
        document.getElementById("mensaje").innerHTML = "❌ Respuesta incorrecta";
        errores++;
    }

    document.getElementById("puntos").innerHTML = puntos;

    document.getElementById("mensaje").innerHTML +=
    "<br><br>" +
    nivel1[actual].explicacion +
    "<br><br>" +
    "<button onclick='siguienteResiduo()'>SIGUIENTE</button>";
}

function siguienteResiduo(){
    actual++;

    if(actual < nivel1.length){
        cargarResiduo();
        document.getElementById("mensaje").innerHTML = "";
    }else{
    puntosNivel1 = puntos;
    aciertosNivel1 = aciertos;
    erroresNivel1 = errores;    
        document.getElementById("juego").innerHTML =
        "<h1>🌟 Nivel 1 completado</h1>" +
        "<p>🏆 Puntos: " + puntos + "</p>" +
        "<p>✅ Aciertos: " + aciertos + "</p>" +
        "<p>❌ Errores: " + errores + "</p>" +
        "<br>" +
       "<div style='margin:30px auto 20px auto;padding:22px;background:#eef8ee;border-radius:12px;max-width:700px;text-align:left;'>" +

    "<p style='text-align:center;font-weight:bold;color:#2e7d32;font-size:20px;margin-bottom:18px;'>💡 ECOCONSEJO</p>" +

    "<hr style='border:none;border-top:1px solid #cfe8cf;margin-bottom:18px;'>" +

    consejoAleatorio +

    "</div>" +

    "<br>" +

    "<button onclick='iniciarNivel2()'>CONTINUAR AL NIVEL 2</button>";
    }
}

function iniciarNivel2(){
    nivelActual = 2;
    residuosActuales = nivel2
    .sort(() => Math.random() - 0.5)
    .slice(0, 10);

    actual = 0;
    puntos = 0;
    aciertos = 0;
    errores = 0;

    document.getElementById("juego").innerHTML =
    "<h2>NIVEL 2: Clasificación por material</h2>" +
    "<p>🏆 Puntos: <span id='puntos'>0</span></p>" +
    "<h3 id='progreso'>Residuo 1/" + residuosActuales.length + "</h3>" +
    "<h1 id='emoji'></h1>" +
    "<h2 id='nombre'></h2>" +
    "<br>" +
    "<button onclick=\"verificarNivel2('organico')\">🟢 Orgánico</button> " +
    "<button onclick=\"verificarNivel2('papel')\">📄 Papel</button> " +
    "<button onclick=\"verificarNivel2('madera')\">🪵 Madera</button> " +
    "<button onclick=\"verificarNivel2('plastico')\">🧴 Plástico</button> " +
    "<button onclick=\"verificarNivel2('tela')\">👕 Tela</button> " +
    "<button onclick=\"verificarNivel2('vidrio')\">🍾 Vidrio</button> " +
    "<button onclick=\"verificarNivel2('metal')\">🥫 Metal</button> " +
    "<button onclick=\"verificarNivel2('especial')\">⚫ Inorgánico de manejo especial</button>" +
    "<button onclick=\"verificarNivel2('noreciclable')\">🚫 No reciclable</button>" +
    "<p id='mensaje'></p>";

    cargarResiduoNivel2();
}
function cargarResiduoNivel2(){
    document.getElementById("emoji").innerHTML = residuosActuales[actual].emoji;
    document.getElementById("nombre").innerHTML = residuosActuales[actual].nombre;
    document.getElementById("progreso").innerHTML = "Residuo " + (actual + 1) + "/" + residuosActuales.length;
    document.getElementById("puntos").innerHTML = puntos;
}

function verificarNivel2(tipo){
    if(tipo === residuosActuales[actual].tipo){
        document.getElementById("mensaje").innerHTML = "✅ ¡Correcto!";
        puntos += 10;
        aciertos++;
    }else{
        document.getElementById("mensaje").innerHTML = "❌ Respuesta incorrecta";
        errores++;
    }

    document.getElementById("puntos").innerHTML = puntos;

    document.getElementById("mensaje").innerHTML +=
    "<br><br>" +
    residuosActuales[actual].explicacion +
    "<br><br>" +
    "<button onclick='siguienteResiduoNivel2()'>SIGUIENTE</button>";
}

function siguienteResiduoNivel2(){
    actual++;

    if(actual < residuosActuales.length){
        cargarResiduoNivel2();
        document.getElementById("mensaje").innerHTML = "";
    }else{
       puntosNivel2 = puntos;
    aciertosNivel2 = aciertos;
    erroresNivel2 = errores;

    mostrarPantallaFinal();
    }
}

function obtenerInsignia(puntosTotales){

    if(puntosTotales <= 79){
        return {
            emoji:"🌱",
            titulo:"Aprendiz Ambiental",
            mensaje:"Estás comenzando tu camino hacia una mejor separación de residuos. Sigue practicando y cada acción contará para cuidar el planeta."
        };
    }

    if(puntosTotales <= 139){
        return {
            emoji:"♻️",
            titulo:"Separador Responsable",
            mensaje:"Conoces las bases de la separación de residuos. Tus decisiones ayudan a reducir la contaminación y aprovechar mejor los materiales."
        };
    }

    if(puntosTotales <= 189){
        return {
            emoji:"🌳",
            titulo:"Guardián Ambiental",
            mensaje:"Excelente trabajo. Demostraste un gran conocimiento sobre la correcta clasificación de residuos."
        };
    }

    return {
        emoji:"👑",
        titulo:"Rey Reciclador",
        mensaje:"¡Impresionante! Has dominado la separación de residuos y eres un ejemplo de compromiso ambiental."
    };
}

function mostrarPantallaFinal(){

    let puntosTotales = puntosNivel1 + puntosNivel2;
    let aciertosTotales = aciertosNivel1 + aciertosNivel2;
    let erroresTotales = erroresNivel1 + erroresNivel2;

    let insignia = obtenerInsignia(puntosTotales);

    document.getElementById("juego").innerHTML =
    "<h1>🎉 ¡Felicidades!</h1>" +

    "<h2>Has completado EcoReto</h2>" +

    "<p><strong>🏆 Puntuación total:</strong> " + puntosTotales + " pts</p>" +

    "<hr>" +

    "<h3>Resultados</h3>" +

    "<p><strong>Nivel 1:</strong> " + aciertosNivel1 + "/10 aciertos</p>" +

    "<p><strong>Nivel 2:</strong> " + aciertosNivel2 + "/10 aciertos</p>" +

    "<p><strong>Total:</strong> " + aciertosTotales + " aciertos y " + erroresTotales + " errores</p>" +

    "<div style='margin:30px auto;padding:25px;background:#eef8ee;border-radius:16px;max-width:650px;box-shadow:0 4px 10px rgba(0,0,0,.08);'>" +

    "<div style='font-size:60px;'>" + insignia.emoji + "</div>" +

    "<p style='font-weight:bold;color:#2e7d32;font-size:18px;margin-top:10px;'>INSIGNIA OBTENIDA</p>" +

    "<h2>" + insignia.titulo + "</h2>" +

    "<p>" + insignia.mensaje + "</p>" +

    "</div>" +

    "<p><strong>💚 Cada acción cuenta.</strong><br>Separar correctamente tus residuos contribuye a una cultura ambiental más responsable.</p>" +

    "<br>" +

    "<button onclick='location.reload()'>JUGAR NUEVAMENTE</button>";
}
</script>

</body>
</html>
