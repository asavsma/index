<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReto</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f5f9f5;
    padding:40px;
}

.pantalla{
    max-width:800px;
    margin:auto;
}

h1{
    color:#2e7d32;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.oculto{
    display:none;
}

</style>

</head>

<body>

<!-- PANTALLA DE INICIO -->

<div id="inicio" class="pantalla">

    <h1>♻️ EcoReto: Separa tus residuos</h1>

    <p>
        Aprende a clasificar correctamente los residuos
        y conviértete en un experto del reciclaje.
    </p>

    <br>

    <button onclick="iniciarJuego()">
        COMENZAR
    </button>

</div>

<!-- PANTALLA DEL JUEGO -->

<div id="juego" class="pantalla oculto">

   <h2>NIVEL 1</h2>

<p>
🏆 Puntos:
<span id="puntos">0</span>
</p>

<h3 id="progreso">
Residuo 1/10
</h3>

<h1 id="emoji">
🍌
</h1>

<h2 id="nombre">
Cáscara de plátano
</h2>

<br>

<button onclick="verificar('organico')">
🟢 Orgánico
</button>

<button onclick="verificar('inorganico')">
⚫ Inorgánico
</button>

<p id="mensaje"></p>

</div>

<script>

const nivel1 = [
{
emoji:"🍌",
nombre:"Cáscara de plátano",
tipo:"organico",
explicacion:"Las cáscaras de frutas son residuos orgánicos y pueden aprovecharse para elaborar composta."
},
{
emoji:"🍎",
nombre:"Restos de manzana",
tipo:"organico",
explicacion:"Los restos de frutas son biodegradables y pueden transformarse en abono natural."
},
{
emoji:"📦",
nombre:"Caja de cereal",
tipo:"inorganico",
explicacion:"Las cajas de cereal están hechas principalmente de cartón y deben separarse para facilitar su reciclaje."
},
{
emoji:"🥬",
nombre:"Restos de verduras",
tipo:"organico",
explicacion:"Los residuos vegetales pueden reincorporarse al suelo mediante procesos de compostaje."
},
{
emoji:"🍂",
nombre:"Hojas secas",
tipo:"organico",
explicacion:"Las hojas secas son materia orgánica y ayudan a enriquecer el suelo cuando se compostan."
},
{
emoji:"🥤",
nombre:"Botella de plástico",
tipo:"inorganico",
explicacion:"El plástico tarda muchos años en degradarse y debe separarse para facilitar su reciclaje."
},
{
emoji:"🥫",
nombre:"Lata de aluminio",
tipo:"inorganico",
explicacion:"El aluminio puede reciclarse muchas veces sin perder sus propiedades."
},
{
emoji:"🔋",
nombre:"Pila",
tipo:"inorganico",
explicacion:"Las pilas contienen sustancias que requieren un manejo adecuado para evitar contaminación."
},
{
emoji:"💡",
nombre:"Foco",
tipo:"inorganico",
explicacion:"Los focos deben separarse correctamente para evitar daños al ambiente y facilitar su disposición adecuada."
},
{
emoji:"📱",
nombre:"Celular viejo",
tipo:"inorganico",
explicacion:"Los aparatos electrónicos contienen materiales que pueden recuperarse mediante reciclaje especializado."
}
];

const ecoConsejos = [

"💚 <strong>Cada acción cuenta.</strong><br><br>Separar los residuos en orgánicos e inorgánicos es el primer paso para facilitar su aprovechamiento y reducir la cantidad de basura que llega a los rellenos sanitarios.",

"🌱 <strong>Los residuos orgánicos tienen una segunda vida.</strong><br><br>Pueden convertirse en composta, un abono natural que mejora la calidad del suelo y ayuda al crecimiento de las plantas.",

"♻️ <strong>Reciclar empieza en casa.</strong><br><br>Una correcta separación permite recuperar materiales y aprovechar mejor los recursos.",

"📦 <strong>Evita contaminar materiales reciclables.</strong><br><br>Cuando mezclamos residuos orgánicos con materiales reciclables, estos pueden perder la posibilidad de reciclarse.",

"🥤 <strong>Ponlo en práctica.</strong><br><br>Antes de depositar una botella, lata o envase en el contenedor correspondiente, procura vaciar completamente su contenido para facilitar su reciclaje.",

"🔋 <strong>Las pilas requieren atención especial.</strong><br><br>No deben mezclarse con la basura común; lo ideal es llevarlas a un centro de acopio autorizado.",

"📄 <strong>El cartón limpio se recicla mejor.</strong><br><br>Mantén las cajas libres de restos de comida o líquidos para facilitar su aprovechamiento.",

"🌎 <strong>Separar correctamente beneficia a todos.</strong><br><br>Una buena clasificación facilita el trabajo de recicladores y centros de aprovechamiento, impulsando una gestión más eficiente de los residuos."

];
    
let actual = 0;
let puntos = 0;
let aciertos = 0;
let errores = 0;
let consejoAleatorio = "";

function iniciarJuego(){
    document.getElementById("inicio").classList.add("oculto");
    document.getElementById("juego").classList.remove("oculto");

    nivel1.sort(() => Math.random() - 0.5);
    
    consejoAleatorio =
    ecoConsejos[Math.floor(Math.random() * ecoConsejos.length)];
    
    actual = 0;
    puntos = 0;
    aciertos = 0;
    errores = 0;

    cargarResiduo();
}

function cargarResiduo(){
    document.getElementById("emoji").innerHTML = nivel1[actual].emoji;
    document.getElementById("nombre").innerHTML = nivel1[actual].nombre;
    document.getElementById("progreso").innerHTML = "Residuo " + (actual + 1) + "/" + nivel1.length;
    document.getElementById("puntos").innerHTML = puntos;
}

function verificar(tipo){
    if(tipo === nivel1[actual].tipo){
        document.getElementById("mensaje").innerHTML = "✅ ¡Correcto!";
        puntos += 10;
        aciertos++;
    }else{
        document.getElementById("mensaje").innerHTML = "❌ Respuesta incorrecta";
        errores++;
    }

    document.getElementById("puntos").innerHTML = puntos;

    document.getElementById("mensaje").innerHTML +=
    "<br><br>" +
    nivel1[actual].explicacion +
    "<br><br>" +
    "<button onclick='siguienteResiduo()'>SIGUIENTE</button>";
}

function siguienteResiduo(){
    actual++;

    if(actual < nivel1.length){
        cargarResiduo();
        document.getElementById("mensaje").innerHTML = "";
    }else{
        document.getElementById("juego").innerHTML =
        "<h1>🌟 Nivel 1 completado</h1>" +
        "<p>🏆 Puntos: " + puntos + "</p>" +
        "<p>✅ Aciertos: " + aciertos + "</p>" +
        "<p>❌ Errores: " + errores + "</p>" +
        "<br>" +
       "<div style='margin:30px auto 20px auto;padding:22px;background:#eef8ee;border-radius:12px;max-width:700px;text-align:left;'>" +

    "<p style='text-align:center;font-weight:bold;color:#2e7d32;font-size:20px;margin-bottom:18px;'>💡 ECOCONSEJO</p>" +

    "<hr style='border:none;border-top:1px solid #cfe8cf;margin-bottom:18px;'>" +

    consejoAleatorio +

    "</div>" +

    "<br>" +

    "<button onclick='iniciarNivel2()'>CONTINUAR AL NIVEL 2</button>";
    }
}

function iniciarNivel2(){
    alert("Aquí iniciaremos el Nivel 2.");
}

</script>

</body>
</html>
